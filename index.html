<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Seguridad</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

video{
width:95%;
border-radius:10px;
}

button{
padding:15px;
margin:10px;
font-size:20px;
border:none;
border-radius:10px;
background:#2196F3;
color:white;
}

canvas{
display:none;
}
</style>
</head>

<body>

<h2>Registro Seguridad</h2>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="capturar('INGRESO')">INGRESO</button>
<button onclick="capturar('SALIDA')">SALIDA</button>
<button onclick="capturar('FOTO')">FOTO</button>

<br><br>

<button onclick="enviarFoto()">ENVIAR FOTO</button>

<canvas id="canvas"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let ultimaImagen = null;

navigator.mediaDevices.getUserMedia({
video:{facingMode:{exact:"environment"}}
})
.then(stream=>{
video.srcObject = stream;
})
.catch(()=>{
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
});
});

function capturar(tipo){

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

ctx.drawImage(video,0,0);

let fecha = new Date().toLocaleString();

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,70);

ctx.fillStyle="white";
ctx.font="28px Arial";
ctx.fillText(fecha,20,40);

ctx.font="26px Arial";
ctx.fillText("SEGURIDAD FIBRAPRINT - UNIDAD CHILCA 04",20,65);

ctx.fillStyle="black";
ctx.fillRect(0,canvas.height-70,canvas.width,70);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(tipo,20,canvas.height-25);

/* LOGO */

let logo = new Image();
logo.src="logo.png";

logo.onload=function(){

let tamaño = 120;

ctx.drawImage(
logo,
canvas.width - tamaño - 20,
canvas.height - tamaño - 90,
tamaño,
tamaño
);

ultimaImagen = canvas.toDataURL();

descargar();

}

}

function descargar(){

let link=document.createElement("a");
link.download="registro.png";
link.href=ultimaImagen;
link.click();

}

function enviarFoto(){

fetch(ultimaImagen)
.then(res=>res.blob())
.then(blob=>{

const file = new File([blob],"registro.png",{type:"image/png"});

if(navigator.share){

navigator.share({
title:"Registro Seguridad",
files:[file]
});

}

});

}

</script>

</body>
</html>
