<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Foto</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#111;
color:white;
}

video{
width:95%;
border-radius:10px;
}

button{
padding:15px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
}

.opciones button{
background:#2196F3;
color:white;
}

canvas{
display:none;
}
</style>
</head>

<body>

<h2>Tomar Foto</h2>

<video id="video" autoplay></video>

<br>

<button onclick="tomarFoto()">Tomar Foto</button>

<div class="opciones">
<button onclick="guardar('INGRESO')">INGRESO</button>
<button onclick="guardar('SALIDA')">SALIDA</button>
<button onclick="guardar('FOTO')">FOTO</button>
</div>

<canvas id="canvas"></canvas>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject = stream;
});

function tomarFoto(){
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
ctx.drawImage(video,0,0);
}

function guardar(tipo){

let fecha = new Date().toLocaleString();

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,60);

ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText(fecha,20,40);

ctx.fillStyle="black";
ctx.fillRect(0,canvas.height-60,canvas.width,60);

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText(tipo,20,canvas.height-20);

let link=document.createElement('a');
link.download="foto_registro.png";
link.href=canvas.toDataURL();
link.click();

}

</script>

</body>
</html>
